version: "3.9"

services:
  stockwise-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockwise-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - PORT=8000
      - ENV=${ENV:-production}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - stockwise-network

networks:
  stockwise-network:
    driver: bridge
